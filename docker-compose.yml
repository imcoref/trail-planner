

services:
  trail-planner:
    build: .
    container_name: trail-planner
    restart: always
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      # Persist the API response cache
      - trail-planner-cache:/app/.cache
      # Persist uploaded custom trails (SQLite DB)
      - trail-planner-uploads:/app/uploads

volumes:
  trail-planner-cache:
  trail-planner-uploads:
